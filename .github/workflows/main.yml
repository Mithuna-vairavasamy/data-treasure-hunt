<script>
// ===== BACKGROUND PARTICLE CANVAS =====
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], animId;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor(){this.reset();}
    reset(){
      this.x = Math.random()*W;
      this.y = Math.random()*H;
      this.vx = (Math.random()-.5)*.25;
      this.vy = (Math.random()-.5)*.25;
      this.r = Math.random()*1.5+.5;
      this.a = Math.random()*.5+.1;
      this.color = Math.random()>.6 ? '#0077ff' : '#00f0ff';
    }
    update(){
      this.x += this.vx; this.y += this.vy;
      if(this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
    }
    draw(){
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle = this.color;
      ctx.globalAlpha = this.a;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Init
  for(let i=0;i<120;i++) particles.push(new Particle());

  // Connection lines
  function drawConnections(){
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x;
        const dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<100){
          ctx.beginPath();
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle='#00f0ff';
          ctx.globalAlpha=(1-dist/100)*.08;
          ctx.lineWidth=.5;
          ctx.stroke();
          ctx.globalAlpha=1;
        }
      }
    }
  }

  // Binary rain
  const binaryDrops=[];
  const binaryCols = Math.floor(W/28);
  for(let i=0;i<binaryCols;i++) binaryDrops.push(Math.random()*H);
  
  function drawBinary(){
    ctx.font='12px monospace';
    ctx.globalAlpha=0.025;
    for(let i=0;i<binaryDrops.length;i++){
      ctx.fillStyle='#00f0ff';
      ctx.fillText(Math.random()>.5?'1':'0', i*28, binaryDrops[i]);
      binaryDrops[i] += 14;
      if(binaryDrops[i]>H) binaryDrops[i]=-14;
    }
    ctx.globalAlpha=1;
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    drawBinary();
    particles.forEach(p=>{p.update();p.draw();});
    drawConnections();
    animId=requestAnimationFrame(loop);
  }
  loop();
})();

// ===== SCROLL REVEALS =====
const revealEls = document.querySelectorAll('.reveal,.reveal-left,.reveal-right');
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('visible');
      io.unobserve(e.target);
    }
  });
},{threshold:.12});
revealEls.forEach(el=>io.observe(el));

// ===== STAGGER DELAYS =====
document.querySelectorAll('.round-card,.rule-item,.stat-card,.detail-item,.team-card').forEach((el,i)=>{
  el.style.transitionDelay=(i%4)*.1+'s';
});

// ===== BACK TO TOP =====
const btt=document.getElementById('btt');
window.addEventListener('scroll',()=>{
  btt.classList.toggle('show',window.scrollY>400);
});

// ===== MOBILE MENU =====
const hamburger=document.getElementById('hamburger');
const mobileMenu=document.getElementById('mobileMenu');
hamburger.addEventListener('click',()=>{
  mobileMenu.classList.toggle('open');
});
function closeMobile(){mobileMenu.classList.remove('open');}

// ===== SMOOTH ACTIVE NAV =====
const sections=document.querySelectorAll('section[id]');
const navLinks=document.querySelectorAll('.nav-links a');
window.addEventListener('scroll',()=>{
  let cur='';
  sections.forEach(s=>{
    if(window.scrollY>=s.offsetTop-120) cur=s.id;
  });
  navLinks.forEach(a=>{
    a.style.color = a.getAttribute('href')==='#'+cur ? 'var(--c)' : '';
  });
});
</script>
