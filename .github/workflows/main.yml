<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Treasure Hunt 2026 | Tesseract Crystal Tech | VIT Chennai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ===== RESET & ROOT ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --c:  #00f0ff;
  --c2: #0077ff;
  --c3: #7dd8ff;
  --g:  #00ff88;
  --dk: #000d1a;
  --dk2:#000508;
  --dk3:#001428;
  --w:  #ffffff;
  --glow: 0 0 20px #00f0ff66, 0 0 60px #0077ff33;
  --glow2: 0 0 30px #00f0ffaa;
  --border: 1px solid #00f0ff22;
  --r: 12px;
}
html{scroll-behavior:smooth;}
body{
  background:var(--dk2);
  color:var(--w);
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
  cursor:default;
}

/* ===== CANVAS BG ===== */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ===== LAYOUT ===== */
.page-wrap{position:relative;z-index:1;}

/* ===== NAV ===== */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:12px 24px;
  background:linear-gradient(180deg,#000d1aee 0%,#000d1a00 100%);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #00f0ff15;
}
.nav-logo{height:38px;filter:drop-shadow(0 0 8px #00f0ff88);}
.nav-links{display:flex;gap:6px;flex-wrap:wrap;}
.nav-links a{
  font-family:'Orbitron',monospace;font-size:10px;font-weight:600;
  color:var(--c3);text-decoration:none;letter-spacing:.12em;
  padding:6px 12px;border:1px solid #00f0ff25;border-radius:4px;
  transition:all .25s;background:#00f0ff05;
}
.nav-links a:hover{background:#00f0ff18;border-color:#00f0ff66;color:var(--c);box-shadow:0 0 12px #00f0ff33;}

/* ===== HERO ===== */
#hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:100px 20px 60px;
  position:relative;overflow:hidden;
  scroll-margin-top:62px;
}
.hero-particles{position:absolute;inset:0;pointer-events:none;}
.hero-logo{
  width:min(320px,65vw);
  filter:drop-shadow(0 0 30px #00f0ff88) drop-shadow(0 0 80px #0077ff44);
  animation:floatLogo 4s ease-in-out infinite, glowPulse 3s ease-in-out infinite;
  margin-bottom:2rem;
}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
@keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 25px #00f0ff88) drop-shadow(0 0 60px #0077ff44);}
  50%{filter:drop-shadow(0 0 45px #00f0ffcc) drop-shadow(0 0 100px #0077ff88);}}

.hero-badge{
  font-family:'Orbitron',monospace;font-size:clamp(.65rem,1.8vw,.85rem);
  color:var(--c);letter-spacing:.5em;text-transform:uppercase;
  margin-bottom:1.2rem;opacity:.8;
}
.hero-title{
  font-family:'Orbitron',monospace;font-size:clamp(2.4rem,8vw,6rem);
  font-weight:900;line-height:.95;letter-spacing:-.01em;
  background:linear-gradient(135deg,#00f0ff 0%,#7dd8ff 40%,#0077ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px #00f0ff88);
  margin-bottom:.5rem;
}
.hero-subtitle{
  font-family:'Orbitron',monospace;font-size:clamp(1rem,3.5vw,1.8rem);
  font-weight:600;color:var(--c3);letter-spacing:.25em;margin-bottom:2rem;
}
.hero-tagline{
  font-size:clamp(1rem,3vw,1.3rem);color:#7dd8ff99;
  font-style:italic;letter-spacing:.05em;margin-bottom:2.5rem;
  max-width:600px;line-height:1.6;
}
.hero-date-pill{
  display:inline-flex;align-items:center;gap:1rem;
  background:linear-gradient(135deg,#00f0ff0f,#0077ff08);
  border:1px solid #00f0ff44;border-radius:50px;
  padding:14px 28px;margin-bottom:2.5rem;
  box-shadow:0 0 30px #00f0ff18,inset 0 1px 0 #00f0ff22;
}
.hero-date-pill .date-num{
  font-family:'Orbitron',monospace;font-size:clamp(1.4rem,4vw,2rem);
  font-weight:900;color:var(--c);text-shadow:var(--glow);
}
.hero-date-pill .date-sep{color:#00f0ff44;font-size:1.5rem;}
.hero-date-pill .date-info{text-align:left;}
.hero-date-pill .date-info .dm{font-family:'Orbitron',monospace;font-size:clamp(.9rem,2.5vw,1.1rem);font-weight:700;color:var(--w);}
.hero-date-pill .date-info .dt{font-size:.85rem;color:var(--c3);letter-spacing:.1em;}

.cta-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
.btn-primary{
  font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;
  letter-spacing:.15em;text-decoration:none;
  padding:14px 32px;border-radius:6px;
  background:linear-gradient(135deg,#00f0ff,#0077ff);
  color:#000d1a;border:none;cursor:pointer;
  box-shadow:0 0 30px #00f0ff66;
  transition:all .25s;display:inline-block;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 50px #00f0ffaa;}
.btn-outline{
  font-family:'Orbitron',monospace;font-size:.85rem;font-weight:600;
  letter-spacing:.15em;text-decoration:none;
  padding:14px 32px;border-radius:6px;
  background:transparent;
  color:var(--c);border:1px solid var(--c);cursor:pointer;
  transition:all .25s;display:inline-block;
}
.btn-outline:hover{background:#00f0ff18;box-shadow:0 0 20px #00f0ff44;}

.scroll-hint{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:scrollBounce 2s ease-in-out infinite;
}
.scroll-hint span{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:#00f0ff55;letter-spacing:.3em;}
.scroll-hint svg{opacity:.4;}
@keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(8px);}}

/* ===== SECTION COMMON ===== */
section{padding:80px 20px;position:relative;scroll-margin-top:62px;}
.section-inner{max-width:1100px;margin:0 auto;}
.section-label{
  font-family:'Share Tech Mono',monospace;font-size:.75rem;
  color:var(--c);letter-spacing:.5em;text-transform:uppercase;
  margin-bottom:.8rem;display:block;opacity:.7;
}
.section-title{
  font-family:'Orbitron',monospace;font-size:clamp(1.6rem,5vw,3rem);
  font-weight:900;color:var(--w);letter-spacing:.05em;
  margin-bottom:.5rem;
}
.section-title span{color:var(--c);}
.section-divider{
  width:80px;height:2px;
  background:linear-gradient(90deg,var(--c),transparent);
  margin:1.2rem 0 2.5rem;
  box-shadow:0 0 8px var(--c);
}

/* ===== ABOUT STRIP ===== */
#about{background:linear-gradient(180deg,#000d1a 0%,#000d20 100%);}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center;}
@media(max-width:700px){.about-grid{grid-template-columns:1fr;}}
.about-text p{font-size:1.15rem;line-height:1.8;color:#ffffffcc;margin-bottom:1rem;}
.about-text p strong{color:var(--c);}
.about-chest{text-align:center;}
.about-chest img{
  width:min(280px,70vw);
  filter:drop-shadow(0 0 30px #00f0ff88) drop-shadow(0 0 60px #0077ff44);
  animation:floatLogo 4s ease-in-out infinite 1s;
}

/* ===== QUICK STATS ===== */
.stats-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:1rem;margin-top:3rem;
}
.stat-card{
  background:linear-gradient(135deg,#00f0ff08,#0077ff05);
  border:1px solid #00f0ff22;border-radius:var(--r);
  padding:1.5rem 1rem;text-align:center;
  position:relative;overflow:hidden;
  transition:transform .25s,border-color .25s;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
}
.stat-card:hover{transform:translateY(-4px);border-color:#00f0ff55;}
.stat-num{
  font-family:'Orbitron',monospace;font-size:clamp(1.8rem,5vw,2.5rem);
  font-weight:900;color:var(--c);text-shadow:var(--glow);display:block;
}
.stat-label{font-size:.85rem;color:var(--c3);letter-spacing:.1em;margin-top:.3rem;}

/* ===== ROUNDS ===== */
#rounds{background:linear-gradient(180deg,#000d20 0%,#000d1a 100%);}
.rounds-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;}
.round-card{
  background:linear-gradient(135deg,#00f0ff06,#0077ff04);
  border:1px solid #00f0ff22;border-radius:var(--r);
  padding:2rem;position:relative;overflow:hidden;
  transition:transform .3s,border-color .3s,box-shadow .3s;
}
.round-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
}
.round-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,#00f0ff08 0%,transparent 60%);
  pointer-events:none;
}
.round-card:hover{transform:translateY(-6px);border-color:#00f0ff55;box-shadow:0 8px 40px #00f0ff18;}
.round-num{
  font-family:'Orbitron',monospace;font-size:3.5rem;font-weight:900;
  color:#00f0ff15;position:absolute;top:1rem;right:1.5rem;
  line-height:1;user-select:none;
}
.round-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  background:#00f0ff12;border:1px solid #00f0ff33;border-radius:4px;
  padding:4px 12px;margin-bottom:1rem;
}
.round-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:0 0 8px var(--c);}
.round-badge span{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--c);letter-spacing:.2em;}
.round-name{
  font-family:'Orbitron',monospace;font-size:clamp(1rem,3vw,1.3rem);
  font-weight:700;color:var(--w);margin-bottom:.5rem;
}
.round-sub{font-size:.85rem;color:var(--c);letter-spacing:.15em;margin-bottom:1rem;font-family:'Share Tech Mono',monospace;}
.round-desc{font-size:1rem;color:#ffffffaa;line-height:1.7;margin-bottom:1.2rem;}
.round-rules{list-style:none;display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.2rem;}
.round-rules li{
  font-size:.9rem;color:#ffffffbb;
  padding-left:1.2rem;position:relative;line-height:1.5;
}
.round-rules li::before{
  content:'▸';color:var(--c);position:absolute;left:0;font-size:.75rem;top:.1em;
}
.round-time{
  display:inline-flex;align-items:center;gap:.5rem;
  background:linear-gradient(135deg,#00f0ff15,#0077ff0a);
  border:1px solid #00f0ff33;border-radius:6px;padding:8px 16px;
}
.round-time svg{flex-shrink:0;}
.round-time span{font-family:'Orbitron',monospace;font-size:.85rem;color:var(--c);letter-spacing:.1em;}

/* ===== RULES ===== */
#rules{background:linear-gradient(180deg,#000d1a 0%,#000d20 100%);}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;}
.rule-item{
  display:flex;gap:1rem;align-items:flex-start;
  background:linear-gradient(135deg,#00f0ff06,#0077ff04);
  border:1px solid #00f0ff1a;border-radius:var(--r);
  padding:1.2rem;transition:border-color .25s,background .25s;
}
.rule-item:hover{border-color:#00f0ff44;background:linear-gradient(135deg,#00f0ff0c,#0077ff08);}
.rule-num{
  font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;
  color:var(--c);min-width:2rem;text-shadow:0 0 10px #00f0ff88;
}
.rule-text{font-size:.95rem;color:#ffffffcc;line-height:1.6;}

/* ===== DETAILS SECTION ===== */
#details{background:linear-gradient(180deg,#000d20 0%,#000d1a 100%);}
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:700px){.details-grid{grid-template-columns:1fr;}}
.detail-item{
  background:linear-gradient(135deg,#00f0ff08,#0077ff05);
  border:1px solid #00f0ff22;border-radius:var(--r);
  padding:1.5rem;display:flex;gap:1rem;align-items:flex-start;
  position:relative;overflow:hidden;
  transition:transform .25s,border-color .25s;
}
.detail-item::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
}
.detail-item:hover{transform:translateY(-3px);border-color:#00f0ff44;}
.detail-icon{
  font-size:1.6rem;min-width:2.2rem;
  filter:drop-shadow(0 0 8px #00f0ff88);
}
.detail-label{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--c3);letter-spacing:.3em;text-transform:uppercase;margin-bottom:.3rem;}
.detail-value{font-family:'Orbitron',monospace;font-size:clamp(.9rem,2.5vw,1.1rem);font-weight:700;color:var(--w);}
.detail-note{font-size:.8rem;color:#ffffff66;margin-top:.2rem;line-height:1.4;}
.highlight-card{
  grid-column:1/-1;
  background:linear-gradient(135deg,#00f0ff10,#0077ff08);
  border:1px solid #00f0ff44;border-radius:var(--r);
  padding:1.5rem;display:flex;gap:1rem;align-items:center;
  box-shadow:inset 0 0 30px #00f0ff08;
}
.highlight-card .detail-value{color:var(--g);}

/* ===== COORDINATORS ===== */
#team{background:linear-gradient(180deg,#000d1a 0%,#000d20 100%);}
.team-section{margin-bottom:3rem;}
.team-section-title{
  font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;
  color:var(--c3);letter-spacing:.3em;text-transform:uppercase;
  margin-bottom:1.5rem;padding-bottom:.8rem;
  border-bottom:1px solid #00f0ff22;
  display:flex;align-items:center;gap:.8rem;
}
.team-section-title::before{content:'◈';color:var(--c);}
.team-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;}
.team-card{
  background:linear-gradient(135deg,#00f0ff08,#0077ff05);
  border:1px solid #00f0ff22;border-radius:var(--r);
  padding:1.5rem;text-align:center;
  position:relative;overflow:hidden;
  transition:transform .3s,border-color .3s,box-shadow .3s;
}
.team-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
}
.team-card:hover{transform:translateY(-5px);border-color:#00f0ff55;box-shadow:0 8px 30px #00f0ff18;}
.team-avatar{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#00f0ff22,#0077ff22);
  border:2px solid #00f0ff44;margin:0 auto 1rem;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:1.4rem;
  color:var(--c);font-weight:900;
  box-shadow:0 0 15px #00f0ff33;
}
.team-name{font-family:'Orbitron',monospace;font-size:clamp(.85rem,2.5vw,1rem);font-weight:700;color:var(--w);margin-bottom:.3rem;}
.team-role{font-size:.8rem;color:var(--c3);letter-spacing:.15em;margin-bottom:.8rem;}
.team-phone{
  display:inline-flex;align-items:center;gap:.5rem;
  background:#00f0ff10;border:1px solid #00f0ff33;border-radius:4px;
  padding:6px 14px;font-family:'Share Tech Mono',monospace;
  font-size:.9rem;color:var(--c);text-decoration:none;
  transition:background .2s;
}
.team-phone:hover{background:#00f0ff20;}

/* ===== REGISTER SECTION ===== */
#register{
  background:linear-gradient(180deg,#000d20 0%,#000508 100%);
  text-align:center;
}
.register-inner{max-width:700px;margin:0 auto;}
.qr-glow-wrap{
  display:inline-block;
  padding:16px;background:#fff;border-radius:16px;
  box-shadow:0 0 40px #00f0ffaa,0 0 80px #0077ff55;
  position:relative;margin:2rem 0;
}
.qr-glow-wrap img{display:block;width:min(280px,70vw);border-radius:8px;}
.qr-scan-line{
  position:absolute;left:16px;right:16px;height:2px;
  background:linear-gradient(90deg,transparent,#00f0ff,transparent);
  box-shadow:0 0 10px var(--c);
  animation:scanLine 2.5s linear infinite;top:16px;
}
@keyframes scanLine{0%{top:16px;}100%{top:calc(100% - 16px);}}
.register-url{
  font-family:'Share Tech Mono',monospace;font-size:.85rem;
  color:var(--c3);word-break:break-all;margin-bottom:1.5rem;
  opacity:.8;
}
.register-note{
  font-size:.9rem;color:#ffffff66;margin-top:1rem;
  line-height:1.6;
}
.tagline-row{
  margin:3rem 0 1rem;
  display:flex;flex-direction:column;gap:.6rem;
}
.tagline-line{
  font-size:clamp(1rem,3vw,1.3rem);color:#ffffffbb;
  font-style:italic;letter-spacing:.03em;
}
.tagline-line strong{color:var(--c);}

/* ===== FOOTER ===== */
footer{
  background:#000508;
  border-top:1px solid #00f0ff15;
  padding:30px 20px;text-align:center;
}
.footer-logo{height:40px;margin-bottom:1rem;filter:drop-shadow(0 0 8px #00f0ff55);}
.footer-text{font-size:.8rem;color:#ffffff44;letter-spacing:.1em;line-height:1.8;}
.footer-text a{color:var(--c3);text-decoration:none;}

/* ===== ANIMATIONS & REVEALS ===== */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-left{opacity:0;transform:translateX(-30px);transition:opacity .7s ease,transform .7s ease;}
.reveal-left.visible{opacity:1;transform:translateX(0);}
.reveal-right{opacity:0;transform:translateX(30px);transition:opacity .7s ease,transform .7s ease;}
.reveal-right.visible{opacity:1;transform:translateX(0);}

/* ===== MOBILE NAV ===== */
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:4px;}
.hamburger span{width:22px;height:2px;background:var(--c);border-radius:2px;transition:.3s;}
.mobile-menu{
  display:none;position:fixed;top:62px;left:0;right:0;
  background:#000d1aee;backdrop-filter:blur(12px);
  padding:16px;z-index:99;border-bottom:1px solid #00f0ff15;
}
.mobile-menu.open{display:block;}
.mobile-menu a{
  display:block;font-family:'Orbitron',monospace;font-size:.85rem;
  color:var(--c3);text-decoration:none;letter-spacing:.12em;
  padding:12px 16px;border-bottom:1px solid #00f0ff10;
  transition:color .2s;
}
.mobile-menu a:hover{color:var(--c);}

@media(max-width:768px){
  .nav-links{display:none;}
  .hamburger{display:flex;}
  .round-num{font-size:2.5rem;}
  section{padding:60px 16px;}
  .hero-date-pill{flex-direction:column;gap:.5rem;text-align:center;padding:12px 20px;}
  .hero-date-pill .date-info{text-align:center;}
  .cta-row{flex-direction:column;align-items:center;}
  .btn-primary,.btn-outline{width:100%;max-width:300px;text-align:center;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .details-grid{grid-template-columns:1fr;}
  .highlight-card{grid-column:1/-1;}
  .rounds-grid{grid-template-columns:1fr;}
  .rules-grid{grid-template-columns:1fr;}
  .team-cards{grid-template-columns:1fr;}
  .qr-glow-wrap{padding:12px;}
  .section-title{font-size:clamp(1.4rem,6vw,2rem);}
  nav{padding:10px 16px;}
  .register-inner{padding:0 4px;}
  .tagline-row{font-size:.95rem;}
  .footer-text{font-size:.75rem;}
}
@media(max-width:400px){
  .hero-title{font-size:2.2rem;}
  .hero-subtitle{font-size:.95rem;letter-spacing:.12em;}
  .stat-num{font-size:1.6rem;}
  .round-card{padding:1.4rem;}
}

/* ===== CUSTOM SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#000508;}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#00f0ff,#0077ff);border-radius:2px;}

/* ===== CRYSTAL SEPARATOR ===== */
.crystal-sep{
  text-align:center;padding:10px 0;color:#00f0ff33;
  font-size:1.2rem;letter-spacing:1rem;user-select:none;
}

/* ===== BACK TO TOP ===== */
#btt{
  position:fixed;bottom:24px;right:24px;z-index:100;
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#00f0ff,#0077ff);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px #00f0ff66;opacity:0;transition:opacity .3s,transform .3s;
  pointer-events:none;
}
#btt.show{opacity:1;pointer-events:all;}
#btt:hover{transform:scale(1.1);}
</style>
</head>
<body>

<!-- BACKGROUND CANVAS -->
